schema_version: 3
profile: continuous
game:
  mode: double
  pie_rule: false
  rings: [4, 6, 8, 10]
model:
  width: 384
  rrt_groups: 5
  attention_heads: 12
  kv_heads: 3
  bottleneck_ratio: 0.5
  ff_multiplier: 2.5
  dropout: 0.0
  rms_norm_eps: 1.0e-06
  score_margin_min: -151
  score_margin_max: 151
  soft_policy_temperature: 4.0
loss:
  policy: 1.0
  outcome: 1.0
  score_margin: 0.25
  ownership: 0.25
  alive: 0.1
  soft_policy: 0.25
optimizer:
  kind: muon_adamw
  adamw_lr: 0.0003
  muon_lr: 0.02
  weight_decay: 0.01
  betas:
  - 0.9
  - 0.95
  muon_momentum: 0.95
  muon_nesterov: true
  muon_ns_steps: 5
  fallback_to_adamw: true
train:
  per_rank_batch_size: 512
  precision: bf16
  compile: true
  seed: 17
  ema_decay: 0.9999
  gradient_clip_norm: 1.0
  scheduler:
    warmup_steps: 5000
    total_steps: 1000000
    min_lr_ratio: 0.05
data:
  schema_version: 4
  ring_stratified: true
  d5_augmentation: true
  workers: 16
  prefetch_factor: 4
  pin_memory: true
  shard_cache_size: 8
selfplay:
  rings: 4
  batch_size: 128
  games: 128
  fast_probability: 0.75
  full_probability: 0.25
  fast_simulations: 32
  full_simulations: 256
  simulation_reference_rings: 6
  simulation_ring_exponent: 1.0
  max_considered: 16
  max_considered_ring_exponent: 1.0
  max_considered_cap: 32
  record_fast_policy_targets: true
  fast_policy_weight: 0.25
  c_visit: 50.0
  c_scale: 1.0
  score_utility_weight: 0.05
  shard_size: 4096
  seed: 17
learner:
  steps: 1000000
  unlimited: true
  minimum_replay_samples: 100000
  recent_samples_per_ring: 500000
  minimum_unique_samples_per_ring: 4096
  max_replay_lag_steps: 60000
  steps_per_window: 1000
  candidate_interval: 28000
  recovery_interval_steps: 1000
  metrics_interval: 10
  replay_poll_seconds: 2.0
  replay_wait_timeout_seconds: 0.0
  resume_latest: true
  device: cuda
  use_ring_mixture_curriculum: true
orchestration:
  enabled: true
  gpus:
  - gpu_id: 0
    role: learner
    cpu_threads: 16
    cpu_affinity: 0-103
  - gpu_id: 1
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 2
    cpu_affinity: 0-103
  - gpu_id: 2
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 2
    cpu_affinity: 0-103
  - gpu_id: 3
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 2
    cpu_affinity: 0-103
  - gpu_id: 4
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 2
    cpu_affinity: 104-207
  - gpu_id: 5
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 2
    cpu_affinity: 104-207
  - gpu_id: 6
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 2
    cpu_affinity: 104-207
  - gpu_id: 7
    role: actor
    cpu_threads: 8
    actor_batch_size: 128
    actor_lanes: 1
    cpu_affinity: 104-207
  actor_games_per_batch: 128
  ring_mixture:
    rings:
    - 4
    - 6
    - 8
    - 10
    curriculum:
    - until_samples: 100000
      rings:
      - 4
    - until_samples: 1000000
      rings:
      - 4
      - 6
    uniform_weight: 1.0
    deficit_weights:
    - 1.0
    - 1.25
    - 1.5
    - 2.0
    step_weights:
    - from_step: 360000
      weights:
      - 0.15
      - 0.15
      - 0.15
      - 0.55
    - from_step: 1000000
      weights:
      - 0.1
      - 0.1
      - 0.1
      - 0.7
  model_refresh:
    manifest_poll_seconds: 2.0
    startup_timeout_seconds: 900.0
    refresh_only_between_batches: true
    selfplay_source: champion
    candidate_probability: 0.8
  restart:
    max_restarts: 8
    initial_backoff_seconds: 2.0
    maximum_backoff_seconds: 60.0
    stable_reset_seconds: 600.0
  directories:
    root: runs/h100-8gpu-throughput
    replay: replay
    learner: learner
    logs: logs
    status: status
    metrics: metrics
  shutdown:
    monitor_interval_seconds: 1.0
    heartbeat_interval_seconds: 5.0
    stale_heartbeat_seconds: 180.0
    stall_timeout_seconds: 1800.0
    terminate_grace_seconds: 900.0
    kill_grace_seconds: 10.0
  distributed:
    enabled: false
    backend: nccl
  hardware_health:
    require_gpu_model: H100
  promotion:
    enabled: true
    gpu_id: 7
    cpu_threads: 8
    poll_seconds: 10.0
    bootstrap_initial_champion: true
    device: cuda
    pause_sharing_mode: true
    pause_ready_timeout_seconds: 930.0
    pause_release_timeout_seconds: 120.0
    final_drain_timeout_seconds: 57600.0
  plateau:
    enabled: true
    max_learner_champion_lag_steps: 60000
    consecutive_terminal_rejections: 2
    action: reset_from_champion
    reset_learning_rate_scale: 0.5
    poll_seconds: 10.0
  retention:
    enabled: true
    dry_run: false
    recovery_dry_run: false
    replay_shards_per_ring: 2000
    candidate_manifests: 20
    gc_interval_windows: 10
arena:
  rings:
  - 4
  - 6
  - 8
  - 10
  pairs_per_ring: 50
  continuation_pairs_per_ring: 150
  simulations: 1024
  max_considered: 32
  c_visit: 50.0
  c_scale: 1.0
  seed: 17
  null_elo: 0.0
  alternative_elo: 35.0
  alpha: 0.05
  beta: 0.05
  regression_floor_elo: -100.0
  per_ring_regression_floor_elo: {}
  confidence: 0.95
  bootstrap_samples: 2000
  unforced_opening_fraction: 0.2
  minimum_pairs_per_ring: 50
  max_pairs_per_ring: 200
