schema_version: 3
profile: standalone-smoke
game:
  mode: double
  pie_rule: false
  rings: [4, 6, 8, 10]

model:
  width: 64
  rrt_groups: 5
  attention_heads: 4
  kv_heads: 1
  bottleneck_ratio: 0.5
  ff_multiplier: 2.0
  dropout: 0.0
  rms_norm_eps: 0.000001
  score_margin_min: -151
  score_margin_max: 151
  soft_policy_temperature: 4.0

loss:
  policy: 1.0
  outcome: 1.0
  score_margin: 0.25
  ownership: 0.25
  alive: 0.1
  soft_policy: 0.25

optimizer:
  kind: adamw
  adamw_lr: 0.0003
  muon_lr: 0.02
  weight_decay: 0.01
  betas: [0.9, 0.95]

train:
  per_rank_batch_size: 32
  precision: fp32
  compile: false
  seed: 17
  ema_decay: 0.99
  gradient_clip_norm: 1.0
  scheduler:
    warmup_steps: 100
    total_steps: 10000
    min_lr_ratio: 0.1

data:
  schema_version: 4
  ring_stratified: false
  d5_augmentation: true
  workers: 0
  prefetch_factor: 2
  pin_memory: false
  shard_cache_size: 1

selfplay:
  rings: 4
  batch_size: 1
  games: 4
  fast_probability: 0.75
  full_probability: 0.25
  fast_simulations: 4
  full_simulations: 16
  simulation_reference_rings: 6
  simulation_ring_exponent: 1.0
  max_considered: 4
  c_visit: 50.0
  c_scale: 1.0
  score_utility_weight: 0.0
  shard_size: 128
  seed: 17

learner:
  steps: 1000
  minimum_replay_samples: 32
  recent_samples_per_ring: 1000
  minimum_unique_samples_per_ring: 1
  max_replay_lag_steps: 5000
  steps_per_window: 50
  candidate_interval: 250
  metrics_interval: 10
  replay_poll_seconds: 0.5
  replay_wait_timeout_seconds: 0.0
  resume_latest: true
  device: cpu
